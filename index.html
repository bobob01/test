<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>專業版俄羅斯方塊</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="side-panel settings">
            <h3>遊戲設定</h3>
            <label>DAS (ms): <input type="number" id="das" value="170" min="50" max="500"></label>
            <label>ARR (ms): <input type="number" id="arr" value="30" min="0" max="100"></label>
            <label>SDF (倍): <input type="number" id="sdf" value="20" min="1" max="40"></label>
            <p class="hint">按鍵：方向鍵移動/軟落，空格鍵硬落，Z/X 旋轉。</p>
            <button id="start-btn">開始/重置</button>
        </div>

        <div class="game-container">
            <canvas id="tetris" width="240" height="400"></canvas>
        </div>

        <div class="side-panel info">
            <div class="stat-box">
                <div>分數</div>
                <div id="score" class="stat-value">0</div>
            </div>
            <div class="next-box">
                <div>接下來</div>
                <canvas id="next" width="100" height="260"></canvas>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
